name: velotracker
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.2
  pinput: ^5.0.2
  intl: ^0.19.0
  dio: ^5.9.0
  http: ^1.2.2
  flutter_secure_storage: ^9.2.4
  google_sign_in: ^7.2.0
  geolocator: ^13.0.2
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  logger: ^2.0.2
  shared_preferences: ^2.5.3
  
  # Плагін для завантажувального екрана (splash screen)
  flutter_native_splash: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

# Налаштування іконки додатка
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#207F56"
  adaptive_icon_foreground: "assets/icons/app_logo.png"

# Налаштування завантажувального екрана
flutter_native_splash:
  color: "#207F56"
  image: assets/icons/app_logo.png  # Тепер логотип буде відображатися на splash screen
  fullscreen: true