name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Завантажуємо код
        uses: actions/checkout@v4

      - name: Налаштовуємо Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Встановлюємо залежності
        run: flutter pub get

      - name: Збираємо iOS (без сертифіката Apple)
        run: flutter build ios --release --no-codesign

      - name: Пакуємо додаток у файл .ipa
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r VeloTracker.ipa Payload
          
      - name: Вивантажуємо готовий файл
        uses: actions/upload-artifact@v4
        with:
          name: VeloTracker-IPA
          path: VeloTracker.ipa